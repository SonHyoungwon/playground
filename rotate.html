<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 회전하기 - 소소한 툴 박스</title>
    <meta name="description" content="잘못 올라간 가로 세로 사진 방향을 클릭 몇 번으로 쉽게 회전시키고 저장하세요.">
    <link rel="stylesheet" href="style.css">
    <style>
        .canvas-container { text-align: center; margin: 24px 0; max-height: 400px; overflow: auto; background: var(--color-border); border-radius: 8px; padding: 12px; }
        .btn-group { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        .btn-group button { flex: 1; min-width: 120px; }
    </style>
</head>
<body>
    <header>
        <h1>소소한 툴 박스</h1>
        <nav>
            <a href="index.html">홈</a>
            <a href="gameboy-filter.html">겜보이 필터</a>
            <a href="eng-address.html">영문주소 변환</a>
            <a href="image-tools.html" class="active">이미지 마법사</a>
        </nav>
    </header>

    <main>
        <section style="margin-bottom: 32px;">
            <h2 style="font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px;">🔄 이미지 회전하기</h2>
            <p style="color: var(--color-text-muted); font-size: 0.95rem;">회전 버튼을 누른 후 가공된 결과물을 즉시 다운로드받을 수 있습니다.</p>
        </section>

        <section class="result-box" style="margin-bottom: 32px;">
            <input type="file" id="imageInput" accept="image/*" style="margin-bottom: 16px;">
            <div class="canvas-container">
                <canvas id="editorCanvas"></canvas>
            </div>
            
            <div class="btn-group">
                <button id="rotateLeftBtn">왼쪽으로 90°</button>
                <button id="rotateRightBtn">오른쪽으로 90°</button>
                <button id="saveBtn" style="background-color: var(--color-point);">저장하기</button>
            </div>
        </section>

        <div class="adsbygoogle-container"></div>
    </main>

    <footer>
        <p>© 2026 소소한 툴 박스. All rights reserved.</p>
    </footer>

    <script>
        const imageInput = document.getElementById('imageInput');
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        let originalImage = new Image();

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => { originalImage.src = event.target.result; };
            reader.readAsDataURL(file);
        });

        originalImage.onload = () => {
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.drawImage(originalImage, 0, 0);
        };

        function rotate(degree) {
            if (!originalImage.src) return alert('이미지를 업로드해주세요.');
            const tempImg = new Image();
            tempImg.src = canvas.toDataURL();
            tempImg.onload = () => {
                const oldWidth = canvas.width;
                canvas.width = canvas.height;
                canvas.height = oldWidth;
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(degree * Math.PI / 180);
                ctx.drawImage(tempImg, -tempImg.width / 2, -tempImg.height / 2);
            };
        }

        document.getElementById('rotateRightBtn').addEventListener('click', () => rotate(90));
        document.getElementById('rotateLeftBtn').addEventListener('click', () => rotate(-90));

        document.getElementById('saveBtn').addEventListener('click', () => {
            if (!originalImage.src) return alert('이미지가 없습니다.');
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            link.download = 'rotated_image.jpg';
            link.href = dataUrl;
            link.click();
        });
    </script>
</body>
</html>
