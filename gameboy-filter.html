<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>겜보이 카메라 필터 - 소소한 툴 박스</title>
    <meta name="description" content="내 사진을 8비트 레트로 픽셀 아트 스타일로 변환해 줍니다.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>소소한 툴 박스</h1>
        <nav>
            <a href="index.html">홈</a>
            <a href="gameboy-filter.html" class="active">겜보이 필터</a>
            <a href="eng-address.html">영문주소 변환</a>
            <a href="image-tools.html">이미지 마법사</a>
        </nav>
    </header>

    <main>
        <section style="margin-bottom: 32px;">
            <h2 style="font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px;">🎮 겜보이 카메라 필터</h2>
            <p style="color: var(--color-text-muted); font-size: 0.95rem;">이미지를 업로드하면 즉시 클래식 게임보이 감성의 4도 도트 그래픽으로 변환합니다.</p>
        </section>

        <section class="result-box" style="margin-bottom: 32px;">
            <input type="file" id="upload" accept="image/*" style="margin-bottom: 20px;">
            <div style="text-align: center;">
                <canvas id="canvas"></canvas>
            </div>
        </section>

        <div class="adsbygoogle-container"></div>
    </main>

    <footer>
        <p>© 2026 소소한 툴 박스. All rights reserved.</p>
    </footer>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const gameboyPalette = [
            [15, 56, 15],     // 가장 어두운 녹색
            [48, 98, 48],     // 어두운 녹색
            [139, 172, 15],   // 밝은 녹색
            [155, 188, 15]    // 가장 밝은 녹색
        ];

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const scale = 128 / img.width;
                    canvas.width = 128;
                    canvas.height = img.height * scale;

                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imgData.data;

                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        const grayscale = 0.2126 * r + 0.7152 * g + 0.0722 * b;

                        let colorIndex = 0;
                        if (grayscale > 192) colorIndex = 3;
                        else if (grayscale > 128) colorIndex = 2;
                        else if (grayscale > 64) colorIndex = 1;

                        const color = gameboyPalette[colorIndex];
                        data[i] = color[0];
                        data[i + 1] = color[1];
                        data[i + 2] = color[2];
                    }
                    ctx.putImageData(imgData, 0, 0);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
