<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지를 겜보이 화면(8비트 픽셀)으로 변환하기 | 레트로 필터</title>
    <meta name="description" content="내 사진을 추억의 닌텐도 게임보이 8비트 그린 스타일로 변환해주는 재미있는 필터입니다. 픽셀 아트 감성을 느껴보세요.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎮 겜보이 카메라 필터</h1>
        <nav><a href="index.html">홈</a> | <a href="eng-address.html">영문주소 변환</a></nav>
    </header>
    <main class="container">
        <h2>내 이미지를 8비트 게임화면으로!</h2>
        <input type="file" id="upload" accept="image/*">
        <canvas id="canvas"></canvas>
    </main>
    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 겜보이 대표 4색 팰럿
        const gbColors = [
            [15, 56, 15],   // 가장 어두운 녹색
            [48, 98, 48],   // 어두운 녹색
            [139, 172, 15], // 밝은 녹색
            [155, 188, 15]  // 가장 밝은 녹색
        ];

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const img = new Image();
            img.onload = () => {
                // 레트로 감성을 위해 해상도를 강제로 낮춤 (가로 160픽셀)
                const scale = 160 / img.width;
                canvas.width = 160;
                canvas.height = img.height * scale;
                
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;

                for (let i = 0; i < data.length; i += 4) {
                    // 그레이스케일 변환
                    const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                    // 4가지 색상 중 가장 가까운 색으로 매칭
                    let closestColor = gbColors[3];
                    if (avg < 64) closestColor = gbColors[0];
                    else if (avg < 128) closestColor = gbColors[1];
                    else if (avg < 192) closestColor = gbColors[2];

                    data[i] = closestColor[0];
                    data[i+1] = closestColor[1];
                    data[i+2] = closestColor[2];
                }
                ctx.putImageData(imgData, 0, 0);
            };
            img.src = URL.createObjectURL(file);
        });
    </script>
</body>
</html>
