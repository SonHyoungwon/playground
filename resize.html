<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 크기 조절 - 소소한 툴 박스</title>
    <meta name="description" content="이미지의 너비(width)를 원하는 픽셀 크기에 맞춰 쉽고 정확하게 줄이거나 키우세요.">
    <link rel="stylesheet" href="style.css">
    <style>
        .canvas-container { text-align: center; margin: 24px 0; max-height: 400px; overflow: auto; background: var(--color-border); border-radius: 8px; padding: 12px; }
        .range-box { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
    </style>
</head>
<body>
    <header>
        <h1>소소한 툴 박스</h1>
        <nav>
            <a href="index.html">홈</a>
            <a href="compress.html">용량 압축</a>
            <a href="resize.html" class="active">크기 조절</a>
            <a href="rotate.html">이미지 회전</a>
            <a href="crop.html">정방형 크롭</a>
        </nav>
    </header>

    <main>
        <section style="margin-bottom: 32px;">
            <h2 style="font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px;">📏 가로 크기 조절</h2>
            <p style="color: var(--color-text-muted); font-size: 0.95rem;">가로 너비를 입력하면 세로 높이가 원본 비율에 맞게 자동으로 계산되어 조절됩니다.</p>
        </section>

        <section class="result-box" style="margin-bottom: 32px;">
            <input type="file" id="imageInput" accept="image/*" style="margin-bottom: 16px;">
            <div class="canvas-container">
                <canvas id="editorCanvas"></canvas>
            </div>
            
            <div class="range-box">
                <label style="font-size: 0.9rem; color: var(--color-text-muted);">목표 너비(px):</label>
                <input type="number" id="resizeWidth" placeholder="예: 800" style="max-width: 160px;">
                <button id="resizeBtn" style="width: auto;">크기 조절 및 저장</button>
            </div>
        </section>

        <div class="adsbygoogle-container"></div>
    </main>

    <footer>
        <p>© 2026 소소한 툴 박스. All rights reserved.</p>
    </footer>

    <script>
        const imageInput = document.getElementById('imageInput');
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        let originalImage = new Image();

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => { originalImage.src = event.target.result; };
            reader.readAsDataURL(file);
        });

        originalImage.onload = () => {
            document.getElementById('resizeWidth').value = originalImage.width;
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.drawImage(originalImage, 0, 0);
        };

        document.getElementById('resizeBtn').addEventListener('click', () => {
            if (!originalImage.src) return alert('이미지를 업로드해주세요.');
            const targetWidth = parseInt(document.getElementById('resizeWidth').value);
            if (!targetWidth || targetWidth <= 0) return alert('올바른 값을 입력해주세요.');

            const ratio = originalImage.height / originalImage.width;
            const targetHeight = targetWidth * ratio;

            const tempImg = new Image();
            tempImg.src = canvas.toDataURL();
            tempImg.onload = () => {
                canvas.width = targetWidth;
                canvas.height = targetHeight;
                ctx.drawImage(tempImg, 0, 0, targetWidth, targetHeight);
                
                // 다운로드 링크 활성화
                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                const link = document.createElement('a');
                link.download = `resized_${targetWidth}.jpg`;
                link.href = dataUrl;
                link.click();
            };
        });
    </script>
</body>
</html>
