<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소소한 유틸리티 & 재미있는 툴 박스</title>
    <meta name="description" content="일상의 불편함을 해소하는 영문 주소 변환기부터 추억의 겜보이 감성 필터까지, 유용하고 재미있는 도구들을 무료로 이용해보세요.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>소소한 툴 박스</h1>
        <nav>
            <a href="index.html" style="color: var(--color-text); font-weight: 600;">홈</a>
            <a href="gameboy-filter.html">겜보이 필터</a>
            <a href="eng-address.html">영문주소 변환</a>
            <a href="image-tools.html">이미지 마법사</a>
        </nav>
    </header>

    <main class="wide-layout">
        <section style="margin-bottom: var(--space-section);">
            <h2 style="font-size: 0.8rem; font-weight: 700; color: var(--color-text-muted); letter-spacing: 0.05em; margin-bottom: 24px; border: none; padding: 0;">TOOLS</h2>
            <ul>
                <li>
                    <a href="gameboy-filter.html">
                        <div class="card-icon-box icon-1">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line><rect x="9" y="6" width="6" height="6"></rect></svg>
                        </div>
                        <strong>🎮 겜보이 카메라 필터</strong>
                        <span>내 사진을 8비트 레트로 픽셀 아트 스타일로 변환해 줍니다.</span>
                    </a>
                </li>
                <li>
                    <a href="eng-address.html">
                        <div class="card-icon-box icon-2">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                        </div>
                        <strong>🏠 영문 주소 변환기</strong>
                        <span>한국어 주소를 해외 직구용 영어 주소로 간편하게 바꿉니다.</span>
                    </a>
                </li>
                <li>
                    <a href="image-tools.html">
                        <div class="card-icon-box icon-3">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        </div>
                        <strong>🖼️ 이미지 마법사</strong>
                        <span>이미지 압축, 가로 크기 조절, 자르기, 회전을 설치 없이 웹에서 바로 처리합니다.</span>
                    </a>
                </li>
            </ul>
        </section>

        <div class="adsbygoogle-container"></div>

        <section style="margin-top: var(--space-section);">
            <h2 style="font-size: 0.8rem; font-weight: 700; color: var(--color-text-muted); letter-spacing: 0.05em; margin-bottom: 24px; border: none; padding: 0;">RESOURCES</h2>
            <ul id="autoDynamicList">
                <li style="box-shadow: none; padding: 0; background: none;">콘텐츠를 불러오는 중입니다...</li>
            </ul>
        </section>
    </main>

    <footer>
        <p>© 2026 소소한 툴 박스. All rights reserved.</p>
    </footer>

    <script>
        // contents.json 파일에서 콘텐츠 정보를 동적으로 가져와 3열 카드로 뿌려주는 스크립트
        fetch('contents.json')
            .then(response => response.json())
            .then(data => {
                const listContainer = document.getElementById('autoDynamicList');
                listContainer.innerHTML = '';

                data.forEach(article => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <a href="content-view.html?id=${article.id}">
                            <div class="card-icon-box" style="background-color: var(--color-bg); color: var(--color-text-muted);">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            </div>
                            <strong>${article.title}</strong>
                            <span>${article.description}</span>
                        </a>
                    `;
                    listContainer.appendChild(li);
                });
            })
            .catch(err => {
                console.error("콘텐츠 목록을 불러오지 못했습니다.", err);
            });
    </script>
</body>
</html>
