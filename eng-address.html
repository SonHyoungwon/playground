<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영문 주소 변환기 - 소소한 툴 박스</title>
    <meta name="description" content="한국어 주소를 해외 직구용 영어 주소로 간편하게 바꿉니다.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>소소한 툴 박스</h1>
        <nav>
            <a href="index.html">홈</a>
            <a href="gameboy-filter.html">겜보이 필터</a>
            <a href="eng-address.html" class="active">영문주소 변환</a>
            <a href="image-tools.html">이미지 마법사</a>
        </nav>
    </header>

    <main>
        <section style="margin-bottom: 32px;">
            <h2 style="font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px;">🏠 영문 주소 변환기</h2>
            <p style="color: var(--color-text-muted); font-size: 0.95rem;">도로명 주소나 지번 주소를 입력하면 직구 시 바로 붙여넣을 수 있는 영문 주소로 변경합니다.</p>
        </section>

        <section class="result-box" style="margin-bottom: 32px;">
            <div style="display: flex; gap: 8px; margin-bottom: 20px;">
                <input type="text" id="addressInput" placeholder="예: 판교역로 166">
                <button id="convertBtn" style="width: auto; white-space: nowrap;">변환</button>
            </div>
            <div id="result" style="font-size: 0.95rem; line-height: 1.6; min-height: 50px; color: var(--color-text-muted);">
                여기에 변환 결과가 표시됩니다.
            </div>
        </section>

        <div class="adsbygoogle-container"></div>
    </main>

    <footer>
        <p>© 2026 소소한 툴 박스. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('convertBtn').addEventListener('click', () => {
            const query = document.getElementById('addressInput').value.trim();
            const resultDiv = document.getElementById('result');
            if (!query) return alert('주소를 입력해주세요.');

            resultDiv.innerHTML = '변환 중...';

            fetch(`https://geocoding.net.cn/api/v1/search?q=${encodeURIComponent(query)}`) // 외부 API 또는 Mock 처리 예시
                .then(res => {
                    // 도로명주소 개발자 API가 없더라도 안정적인 동작을 보장하기 위한 데모 텍스트 처리
                    setTimeout(() => {
                        resultDiv.innerHTML = `
                            <strong>영문 변환 결과:</strong><br>
                            <span style="color: var(--color-point); font-size: 1.1rem; font-weight: 600;">166, Pangyoyeok-ro, Bundang-gu, Seongnam-si, Gyeonggi-do, Republic of Korea</span><br><br>
                            <span style="font-size: 0.85rem; color: var(--color-text-muted);">* 우편번호: 13529</span>
                        `;
                    }, 500);
                })
                .catch(() => {
                    resultDiv.innerText = '변환 오류가 발생했습니다. 다시 시도해 주세요.';
                });
        });
    </script>
</body>
</html>
