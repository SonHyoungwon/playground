<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">소소한 꿀팁 읽을거리</title>
    <meta id="pageDesc" name="description" content="유용한 정보와 재미있는 칼럼을 읽어보세요.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="articleTitle">로딩 중...</h1>
        <nav><a href="index.html">홈으로 가기</a></nav>
    </header>
    <main>
        <p id="articleDesc" style="color: #718096; font-style: italic; margin-bottom: 20px;"></p>
        <div id="articleBody" class="result-box" style="background:#fff; border:none; white-space:pre-wrap;">
            글을 불러오는 중입니다...
        </div>
    </main>

    <script>
        // 주소창에서 (?id=content1) 같은 신호를 읽어내는 마법
        const urlParams = new URLSearchParams(window.location.search);
        const contentId = urlParams.get('id');

        // 1단계에서 만든 글 상자(json) 자동으로 열기
        fetch('contents.json')
            .then(response => response.json())
            .then(data => {
                // 상자 안에서 일치하는 글 찾기
                const article = data.find(item => item.id === contentId);
                
                if (article) {
                    // 찾은 글을 화면에 자동으로 쏙쏙 끼워넣기
                    document.title = article.title;
                    document.getElementById('pageDesc').setAttribute('content', article.description);
                    document.getElementById('articleTitle').innerText = article.title;
                    document.getElementById('articleDesc').innerText = article.description;
                    document.getElementById('articleBody').innerText = article.body;
                } else {
                    document.getElementById('articleTitle').innerText = "글을 찾을 수 없어요 😢";
                    document.getElementById('articleBody').innerText = "올바른 주소인지 확인해 주세요.";
                }
            })
            .catch(err => {
                console.error("글을 불러오는데 실패했습니다.", err);
            });
    </script>
</body>
</html>
