<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 마법사 - 소소한 툴 박스</title>
    <meta name="description" content="용량 압축, 크기 조절, 자르기, 회전을 원스톱으로 지원하는 이미지 마법사입니다.">
    <link rel="stylesheet" href="style.css">
    <style>
        .tool-box { background-color: var(--color-card-bg); border: 1px solid var(--color-border); padding: 32px 24px; border-radius: 12px; margin-bottom: 24px; }
        .canvas-container { text-align: center; margin: 24px 0; max-height: 400px; overflow: auto; background: var(--color-border); border-radius: 8px; padding: 12px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .btn-group button { flex: 1; min-width: 100px; }
        .range-box { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
        .range-box input { flex: 1; }
    </style>
</head>
<body>
    <header>
        <h1>소소한 툴 박스</h1>
        <nav>
            <a href="index.html">홈</a>
            <a href="gameboy-filter.html">겜보이 필터</a>
            <a href="eng-address.html">영문주소 변환</a>
            <a href="image-tools.html" class="active">이미지 마법사</a>
        </nav>
    </header>

    <main>
        <section style="margin-bottom: 32px;">
            <h2 style="font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px;">🖼️ 이미지 마법사</h2>
            <p style="color: var(--color-text-muted); font-size: 0.95rem;">파일을 선택한 후 아래 원하는 기능 영역에서 개별 가공을 진행하세요.</p>
        </section>

        <section class="result-box" style="margin-bottom: 32px;">
            <input type="file" id="imageInput" accept="image/*" style="margin-bottom: 16px;">
            <div class="canvas-container">
                <canvas id="editorCanvas"></canvas>
            </div>
        </section>

        <div id="compress-section" class="tool-box">
            <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 12px;">🗜️ 이미지 용량 압축 & 저장</h3>
            <div class="range-box">
                <label style="font-size: 0.9rem; color: var(--color-text-muted);">압축 품질:</label>
                <input type="range" id="qualityRange" min="10" max="100" value="80">
                <span id="qualityVal" style="font-weight: 600; min-width: 40px; text-align: right;">80%</span>
            </div>
            <button id="downloadBtn">압축된 이미지 다운로드</button>
        </div>

        <div id="resize-section" class="tool-box">
            <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 12px;">📏 가로 크기(너비) 조절</h3>
            <div class="range-box">
                <label style="font-size: 0.9rem; color: var(--color-text-muted);">목표 너비(px):</label>
                <input type="number" id="resizeWidth" placeholder="예: 500" style="max-width: 160px;">
                <button id="resizeBtn" style="width: auto;">크기 적용</button>
            </div>
        </div>

        <div id="rotate-section" class="tool-box">
            <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 12px;">🔄 이미지 회전하기</h3>
            <div class="btn-group">
                <button id="rotateLeftBtn">왼쪽으로 90°</button>
                <button id="rotateRightBtn">오른쪽으로 90°</button>
            </div>
        </div>

        <div id="crop-section" class="tool-box">
            <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 12px;">✂️ 정사각형 잘라내기</h3>
            <p style="font-size: 0.85rem; color: var(--color-text-muted); margin-bottom: 16px;">가운데 중심 비율에 맞추어 이미지를 1:1 정방형으로 잘라냅니다.</p>
            <button id="cropBtn">정중앙 자르기 적용</button>
        </div>

        <div class="adsbygoogle-container"></div>
    </main>

    <footer>
        <p>© 2026 소소한 툴 박스. All rights reserved.</p>
    </footer>

    <script>
        const imageInput = document.getElementById('imageInput');
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        
        let originalImage = new Image();

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        originalImage.onload = () => {
            document.getElementById('resizeWidth').value = originalImage.width;
            resetCanvas(originalImage.width, originalImage.height);
            ctx.drawImage(originalImage, 0, 0);
        };

        function resetCanvas(w, h) {
            canvas.width = w;
            canvas.height = h;
        }

        // 압축 제어
        const qualityRange = document.getElementById('qualityRange');
        const qualityVal = document.getElementById('qualityVal');
        qualityRange.addEventListener('input', (e) => {
            qualityVal.innerText = e.target.value + '%';
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!originalImage.src) return alert('이미지를 업로드해주세요.');
            const quality = parseInt(qualityRange.value) / 100;
            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            const link = document.createElement('a');
            link.download = 'edited_image.jpg';
            link.href = dataUrl;
            link.click();
        });

        // 리사이즈
        document.getElementById('resizeBtn').addEventListener('click', () => {
            if (!originalImage.src) return alert('이미지를 업로드해주세요.');
            const targetWidth = parseInt(document.getElementById('resizeWidth').value);
            if (!targetWidth || targetWidth <= 0) return alert('올바른 값을 입력해주세요.');

            const ratio = originalImage.height / originalImage.width;
            const targetHeight = targetWidth * ratio;

            const tempImg = new Image();
            tempImg.src = canvas.toDataURL();
            tempImg.onload = () => {
                resetCanvas(targetWidth, targetHeight);
                ctx.drawImage(tempImg, 0, 0, targetWidth, targetHeight);
            };
        });

        // 회전
        function rotate(degree) {
            if (!originalImage.src) return alert('이미지를 업로드해주세요.');
            const tempImg = new Image();
            tempImg.src = canvas.toDataURL();
            tempImg.onload = () => {
                resetCanvas(canvas.height, canvas.width);
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(degree * Math.PI / 180);
                ctx.drawImage(tempImg, -tempImg.width / 2, -tempImg.height / 2);
            };
        }
        document.getElementById('rotateRightBtn').addEventListener('click', () => rotate(90));
        document.getElementById('rotateLeftBtn').addEventListener('click', () => rotate(-90));

        // 크롭
        document.getElementById('cropBtn').addEventListener('click', () => {
            if (!originalImage.src) return alert('이미지를 업로드해주세요.');
            const size = Math.min(canvas.width, canvas.height);
            const sourceX = (canvas.width - size) / 2;
            const sourceY = (canvas.height - size) / 2;

            const tempImg = new Image();
            tempImg.src = canvas.toDataURL();
            tempImg.onload = () => {
                resetCanvas(size, size);
                ctx.drawImage(tempImg, sourceX, sourceY, size, size, 0, 0, size, size);
            };
        });
    </script>
</body>
</html>
