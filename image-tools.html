<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무료 이미지 편집기 | 이미지 압축, 크기 조절, 자르기, 회전</title>
    <meta name="description" content="설치 없이 웹에서 바로 사용하는 이미지 도구. 이미지 용량 압축, 사이즈 조절, 사진 잘라내기, 상하좌우 회전 기능을 무료로 이용하세요.">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 이미지 도구 전용 추가 스타일 */
        .tool-box { border: 1px solid #edf2f7; padding: 20px; border-radius: 12px; margin-bottom: 20px; background: #fff; }
        .canvas-container { text-align: center; margin: 20px 0; max-height: 400px; overflow: auto; background: #eee; border-radius: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .btn-group button { flex: 1; min-width: 100px; }
        .range-box { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .range-box input { flex: 1; }
    </style>
</head>
<body>
    <header>
        <h1>🖼️ 초간단 이미지 마법사</h1>
        <nav>
            <a href="index.html">홈</a> | 
            <a href="gameboy-filter.html">겜보이 필터</a> | 
            <a href="eng-address.html">영문주소 변환</a>
        </nav>
    </header>
    <main>
        <h2>쉽고 빠른 이미지 편집 도구</h2>
        <p>편집할 이미지 파일을 먼저 선택해 주세요!</p>
        <input type="file" id="imageInput" accept="image/*" style="margin-bottom: 20px;">

        <div class="canvas-container">
            <canvas id="editorCanvas"></canvas>
        </div>

        <div class="tool-box">
            <h3>🗜️ 1. 이미지 용량 압축 & 저장</h3>
            <div class="range-box">
                <label>압축 품질:</label>
                <input type="range" id="qualityRange" min="10" max="100" value="80">
                <span id="qualityVal">80%</span>
            </div>
            <button id="downloadBtn">압축된 이미지 다운로드</button>
        </div>

        <div class="tool-box">
            <h3>📏 2. 가로 크기(너비) 조절</h3>
            <div class="range-box">
                <label>원하는 너비(px):</label>
                <input type="number" id="resizeWidth" placeholder="예: 500" style="width: 100px; padding: 5px;">
                <button id="resizeBtn" style="width: auto; padding: 8px 15px;">크기 변경 적용</button>
            </div>
        </div>

        <div class="tool-box">
            <h3>🔄 3. 이미지 회전하기</h3>
            <div class="btn-group">
                <button id="rotateLeftBtn">왼쪽으로 90°</button>
                <button id="rotateRightBtn">오른쪽으로 90°</button>
            </div>
        </div>

        <div class="tool-box">
            <h3>✂️ 4. 이미지 반으로 쏙 잘라내기 (정중앙 크롭)</h3>
            <p style="font-size: 0.85rem; color:#718096;">버튼을 누르면 이미지의 가운데를 기준으로 정사각형 모양만 남기고 잘라냅니다.</p>
            <button id="cropBtn" style="background-color: #e53e3e;">가운데 정방형으로 자르기</button>
        </div>
    </main>

    <script>
        const imageInput = document.getElementById('imageInput');
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        
        let originalImage = new Image();
        let currentRotation = 0;

        // 이미지를 불러왔을 때 캔버스에 그리기
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        originalImage.onload = () => {
            currentRotation = 0;
            document.getElementById('resizeWidth').value = originalImage.width;
            resetCanvas(originalImage.width, originalImage.height);
            ctx.drawImage(originalImage, 0, 0);
        };

        // 캔버스 크기를 새로 맞춰주는 함수
        function resetCanvas(w, h) {
            canvas.width = w;
            canvas.height = h;
        }

        // [기능 1] 압축 및 다운로드
        const qualityRange = document.getElementById('qualityRange');
        const qualityVal = document.getElementById('qualityVal');
        qualityRange.addEventListener('input', (e) => {
            qualityVal.innerText = e.target.value + '%';
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!originalImage.src) return alert('이미지를 먼저 업로드해 주세요!');
            
            const quality = parseInt(qualityRange.value) / 100;
            // jpeg 포맷으로 압축률을 적용해 다운로드 링크 생성
            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            
            const link = document.createElement('a');
            link.download = 'compressed_image.jpg';
            link.href = dataUrl;
            link.click();
        });

        // [기능 2] 사이즈 조절
        document.getElementById('resizeBtn').addEventListener('click', () => {
            if (!originalImage.src) return alert('이미지를 먼저 업로드해 주세요!');
            const targetWidth = parseInt(document.getElementById('resizeWidth').value);
            if (!targetWidth || targetWidth <= 0) return alert('올바른 너비를 입력해 주세요.');

            // 비율에 맞게 높이 계산
            const ratio = originalImage.height / originalImage.width;
            const targetHeight = targetWidth * ratio;

            // 임시로 현재 화면을 복사해두고 크기 조절
            const tempImg = new Image();
            tempImg.src = canvas.toDataURL();
            tempImg.onload = () => {
                resetCanvas(targetWidth, targetHeight);
                ctx.drawImage(tempImg, 0, 0, targetWidth, targetHeight);
            };
        });

        // [기능 3] 이미지 회전 (오른쪽/왼쪽)
        function rotate(degree) {
            if (!originalImage.src) return alert('이미지를 먼저 업로드해 주세요!');
            
            const tempImg = new Image();
            tempImg.src = canvas.toDataURL();
            tempImg.onload = () => {
                // 회전 시 가로세로가 뒤바뀜
                resetCanvas(canvas.height, canvas.width);
                
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(degree * Math.PI / 180);
                ctx.drawImage(tempImg, -tempImg.width / 2, -tempImg.height / 2);
            };
        }
        document.getElementById('rotateRightBtn').addEventListener('click', () => rotate(90));
        document.getElementById('rotateLeftBtn').addEventListener('click', () => rotate(-90));

        // [기능 4] 이미지 중앙 잘라내기 (Crop)
        document.getElementById('cropBtn').addEventListener('click', () => {
            if (!originalImage.src) return alert('이미지를 먼저 업로드해 주세요!');
            
            const size = Math.min(canvas.width, canvas.height);
            const sourceX = (canvas.width - size) / 2;
            const sourceY = (canvas.height - size) / 2;

            const tempImg = new Image();
            tempImg.src = canvas.toDataURL();
            tempImg.onload = () => {
                resetCanvas(size, size);
                ctx.drawImage(tempImg, sourceX, sourceY, size, size, 0, 0, size, size);
            };
        });
    </script>
</body>
</html>
